<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Golampi IDE</title>

<style>
body {
    font-family: monospace;
    background: #1e1e1e;
    color: white;
    padding: 20px;
    margin: 0;
}

h2 {
    margin-bottom: 10px;
}

textarea {
    width: 100%;
    height: 300px;
    background: #252526;
    color: white;
    border: none;
    padding: 10px;
    resize: none;
}

button {
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
    background: #333;
    color: white;
    border: none;
    border-radius: 4px;
}

button:hover {
    background: #444;
}

#output {
    margin-top: 20px;
    background: black;
    padding: 10px;
    min-height: 100px;
    white-space: pre-wrap;
}

#reports {
    margin-top: 20px;
    background: #252526;
    padding: 10px;
    border-radius: 4px;
}
</style>
</head>

<body>

<h2>Golampi Interpreter</h2>

<!-- Barra de acciones -->
<div id="actions">
    <button onclick="nuevoArchivo()">Nuevo / Limpiar</button>
    <button onclick="cargarArchivo()">Cargar archivo</button>
    <button onclick="guardarCodigo()">Guardar código</button>
    <button onclick="runCode()">Ejecutar / Analizar</button>
    <button onclick="limpiarConsola()">Limpiar consola</button>
</div>

<!-- Editor de código -->
<h3>Editor de Código:</h3>
<textarea id="code"></textarea>

<!-- Consola de salida -->
<h3>Consola de Salida:</h3>
<pre id="output"></pre>

<!-- Panel de reportes -->
<h3>Reportes:</h3>
<div id="reports">
    <button onclick="descargarReporte('resultado')">Descargar resultado</button>
    <button onclick="descargarReporte('errores')">Descargar errores</button>
    <button onclick="descargarReporte('simbolos')">Descargar tabla de símbolos</button>
</div>

<script>
// Nuevo / Limpiar
function nuevoArchivo() {
    document.getElementById("code").value = "";
    document.getElementById("output").textContent = "";
}

// Cargar archivo
function cargarArchivo() {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".txt,.golampi";
    input.onchange = e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = () => {
            document.getElementById("code").value = reader.result;
        };
        reader.readAsText(file);
    };
    input.click();
}

// Guardar código
function guardarCodigo() {
    const code = document.getElementById("code").value;
    const blob = new Blob([code], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "codigo.golampi.txt";
    link.click();
}

// Ejecutar / Analizar
function runCode() {
    const code = document.getElementById("code").value;
    document.getElementById("output").textContent = "Ejecutando...\n";

    fetch("../BACKEND/Codigo/Execute.php", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: "code=" + encodeURIComponent(code)
    })
    .then(res => res.json())
    .then(data => {

        let salida = data.output || "";
        window._ultimosErrores = data.errors || [];

        if (window._ultimosErrores.length > 0) {
            salida += "\n\n--- ERRORES ---\n";
            window._ultimosErrores.forEach(err => {
                salida += `[${err.type}] Línea ${err.line}, Col ${err.column}: ${err.description}\n`;
            });
        }
        document.getElementById("output").textContent = salida;
    })
    .catch(error => {
        document.getElementById("output").textContent = "Error: " + error;
    });
}

// Limpiar consola
function limpiarConsola() {
    document.getElementById("output").textContent = "";
}

// Descargar reportes
function descargarReporte(tipo) {
    if (tipo === "errores") {
        const errors = window._ultimosErrores || [];
        let html = `<html><head><meta charset="UTF-8"></head><body>`;
        html += `<h2>Tabla de Errores</h2>`;
        html += `<table border='1' style='border-collapse:collapse;width:100%'>`;
        html += `<tr>
            <th>#</th>
            <th>Tipo</th>
            <th>Descripcion</th>
            <th>Linea</th>
            <th>Columna</th>
        </tr>`;

        if (errors.length === 0) {
            html += `<tr><td colspan='5' style='text-align:center'>Sin errores</td></tr>`;
        } else {
            errors.forEach(e => {
                html += `<tr>
                    <td>${e.id}</td>
                    <td>${e.type}</td>
                    <td>${e.description}</td>
                    <td>${e.line}</td>
                    <td>${e.column}</td>
                </tr>`;
            });
        }

        html += `</table></body></html>`;

        const blob = new Blob([html], { type: "text/html" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "errores.html";
        link.click();
        return;
    }

    window.location.href = "../BACKEND/Codigo/Execute.php?reporte=" + tipo;
}
</script>

</body>
</html>
